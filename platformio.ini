[env:esp32-s3-devkitc-1]
platform = espressif32@6.4.0
board = esp32-s3-devkitc-1
framework = arduino

upload_speed = 921600      
monitor_speed = 115200
upload_port = COM3
monitor_port = COM3

build_flags =
    -D CORE_DEBUG_LEVEL=0
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1         ; ⚡ đảm bảo USB CDC (Serial qua USB) hoạt động ổn định
    -D CONFIG_I2S_SUPPORTS_PDM=1  ; ⚡ đảm bảo I2S RX hoạt động tốt trên ESP32-S3

lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0
    https://github.com/kosme/arduinoFFT.git
